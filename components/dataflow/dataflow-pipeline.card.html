<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-background-alt1); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .stack { display: flex; flex-direction: column; gap: 26px; max-width: 940px; }
  .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--color-foreground-alt3); margin-bottom: 8px; }
  .flow-box { height: 420px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { DfPipelineFlow, DfExecutionLog, TiaraButton } = window.TiaraDesignSystemNyma_96297e;

const NODES = [
  { id: 'orders', name: 'orders', description: 'PostgreSQL source', connector: 'analytics_pg', type: 'source', icon: 'database' },
  { id: 'customers', name: 'customers', description: 'Salesforce source', connector: 'Sales Cloud', type: 'source', icon: 'cloud' },
  { id: 'enriched', name: 'orders_enriched', description: 'Joined on customer_id', type: 'join' },
  { id: 'agg', name: 'revenue_by_region', description: 'Aggregation', type: 'derived' },
  { id: 'subset', name: 'eu_orders', description: 'Subset · region = EU', type: 'derived' },
];
const CONNS = [
  { from: 'orders', to: 'enriched', operation: 'Inner join' },
  { from: 'customers', to: 'enriched', operation: 'Inner join' },
  { from: 'enriched', to: 'agg', operation: 'Aggregation' },
  { from: 'enriched', to: 'subset', operation: 'Subset' },
];

const EXECS = [
  {
    id: 'e1', status: 'succeeded', pipeline: 'daily_revenue_sync', statusText: 'Completed', workspace: 'Production',
    startTime: '2026-06-25 14:32', duration: '00:04:31', user: 'data-eng', hasAudit: true,
    details: [
      { outcome: 'ok', description: 'Read orders (1.4M rows)', occurredAt: '14:32:01', duration: '52s', user: 'system' },
      { outcome: 'ok', description: 'Join orders_enriched', occurredAt: '14:33:10', duration: '1m 12s', user: 'system' },
      { outcome: 'ok', description: 'Export to S3', occurredAt: '14:35:40', duration: '2m 27s', user: 'system' },
    ],
  },
  {
    id: 'e2', status: 'warning', pipeline: 'hubspot_contacts', statusText: 'Partially failed', workspace: 'Production',
    startTime: '2026-06-25 13:10', duration: '00:01:58', user: 'data-eng',
    details: [
      { outcome: 'ok', description: 'Fetch contacts', occurredAt: '13:10:02', duration: '44s', user: 'system' },
      { outcome: 'warning', description: 'Export — 12 rows rejected', occurredAt: '13:11:30', duration: '1m 02s', user: 'system' },
    ],
  },
  {
    id: 'e3', status: 'failed', pipeline: 'sqs_orders_stream', statusText: 'Failed — DLQ', workspace: 'Staging',
    startTime: '2026-06-25 09:48', duration: '00:00:12', user: 'svc-account',
    details: [{ outcome: 'ko', description: 'Connection refused (timeout)', occurredAt: '09:48:12', duration: '12s', user: 'system' }],
  },
  {
    id: 'e4', status: 'running', pipeline: 'nightly_warehouse_load', statusText: 'Running', workspace: 'Production',
    startTime: '2026-06-25 15:00', duration: '00:02:09', user: 'scheduler',
  },
];

function Demo() {
  const [sel, setSel] = React.useState('enriched');
  return (
    <div className="stack">
      <div>
        <div className="lbl">DfPipelineFlow — visual transformation DAG (click a node, hover a link label)</div>
        <div className="flow-box">
          <DfPipelineFlow
            title="Pipeline flow"
            subtitle="5 datasets · 2 sources"
            nodes={NODES}
            connections={CONNS}
            selectedId={sel}
            onSelect={(n) => setSel(n.id)}
            actions={<TiaraButton size="sm" variant="secondary" leftIcon={<i className="fa-solid fa-plus" />}>Add dataset</TiaraButton>}
          />
        </div>
      </div>
      <div>
        <div className="lbl">DfExecutionLog — execution monitor (click a row to expand)</div>
        <DfExecutionLog executions={EXECS} defaultExpandedId="e1" onOpenAudit={() => {}} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
