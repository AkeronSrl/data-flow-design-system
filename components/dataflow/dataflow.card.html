<!-- @dsCard group="Data Flow" viewport="940x960" name="Pipeline building blocks" subtitle="SchemaTree · ExpressionEditor · FlowWizard · VariableMapping · FailViewer · EditableList" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-background-alt1); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; max-width: 900px; }
  .cell { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .cell--wide { grid-column: 1 / -1; }
  .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--color-foreground-alt3); }
  .surface { background: var(--color-background); border: 1px solid var(--color-border-light); border-radius: var(--radius-xl); box-shadow: var(--shadow-panel); padding: 16px; }
  .schema-box { height: 320px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const {
  DfSchemaTree, DfExpressionEditor, DfFlowWizard, DfVariableMapping, DfFailViewer, DfEditableList,
} = window.TiaraDesignSystemNyma_96297e;

const SCHEMA = [
  {
    id: 'pg', label: 'analytics_pg', description: 'PostgreSQL · 14.2', icon: 'fa-solid fa-database',
    defaultExpanded: true, badge: { text: '3', tone: 'neutral' },
    items: [
      {
        id: 'public', label: 'public', icon: 'fa-solid fa-folder', defaultExpanded: true,
        items: [
          {
            id: 'orders', label: 'orders', description: 'table · 1.4M rows', icon: 'fa-solid fa-table',
            selectable: true, badge: { text: '8', tone: 'info' },
            items: [
              { id: 'o_id', label: 'order_id', selectable: true, leadingBadge: { text: 'PK', tone: 'success' }, description: 'bigint' },
              { id: 'o_cust', label: 'customer_id', selectable: true, leadingBadge: { text: 'INT', tone: 'neutral' }, description: 'bigint' },
              { id: 'o_total', label: 'total_amount', selectable: true, leadingBadge: { text: 'NUM', tone: 'neutral' }, description: 'numeric(12,2)' },
              { id: 'o_at', label: 'created_at', selectable: true, leadingBadge: { text: 'TS', tone: 'warning' }, description: 'timestamptz' },
            ],
          },
          { id: 'customers', label: 'customers', description: 'table · 92K rows', icon: 'fa-solid fa-table', selectable: true, badge: { text: '12', tone: 'info' }, hasItems: true, items: [] },
        ],
      },
    ],
  },
];

const LEFT = [{ name: 'order_id' }, { name: 'customer_id' }, { name: 'total_amount' }];
const RIGHT = [{ name: 'id' }, { name: 'account_ref' }, { name: 'amount_usd' }, { name: 'order_total' }];

function Demo() {
  const [expr, setExpr] = React.useState('ROUND(total_amount * 1.22, 2)');
  return (
    <div className="grid">
      <div className="cell">
        <span className="lbl">DfSchemaTree — data-source explorer</span>
        <div className="surface schema-box">
          <DfSchemaTree
            title="analytics_pg"
            summary="PostgreSQL · 3 tables"
            nodes={SCHEMA}
            onSelect={() => {}}
          />
        </div>
      </div>

      <div className="cell">
        <span className="lbl">DfExpressionEditor — formula with autocomplete</span>
        <DfExpressionEditor
          value={expr}
          onChange={setExpr}
          columns={['order_id', 'customer_id', 'total_amount', 'created_at']}
          rows={4}
        />
        <span className="lbl" style={{ marginTop: 6 }}>DfEditableList — pipeline parameters</span>
        <DfEditableList
          defaultItems={[
            { id: '1', description: 'batch_size = 5000' },
            { id: '2', description: 'on_error = skip' },
          ]}
          addLabel="Add parameter"
        />
      </div>

      <div className="cell">
        <span className="lbl">DfVariableMapping — export column mapping</span>
        <DfVariableMapping
          title="Map source → target"
          leftVariables={LEFT}
          rightVariables={RIGHT}
          defaultValue={{ order_id: 'id', total_amount: 'amount_usd' }}
        />
        <span className="lbl" style={{ marginTop: 6 }}>DfFailViewer — validation messages</span>
        <DfFailViewer
          messages={[
            { level: 'error', field: 'customer_id', message: 'No mapping selected for a required target column.' },
            { level: 'warning', field: 'created_at', message: 'Source timezone is implicit; target expects UTC.' },
            { level: 'info', field: 'Connection', message: 'Using cached schema from 2026-06-25 14:32.' },
          ]}
        />
      </div>

      <div className="cell">
        <span className="lbl">DfFlowWizard — multi-step dataset wizard</span>
        <DfFlowWizard
          title="New source dataset"
          style={{ width: '100%', height: 300 }}
          steps={[
            { label: 'Connection', content: <p style={{ margin: 0, color: 'var(--color-foreground-alt2)', fontSize: 14 }}>Choose the connector and schema to read from. Pick a table in the explorer to the left, then continue.</p> },
            { label: 'Columns', content: <p style={{ margin: 0, color: 'var(--color-foreground-alt2)', fontSize: 14 }}>Select and cast the columns this dataset exposes.</p> },
            { label: 'Review', content: <p style={{ margin: 0, color: 'var(--color-foreground-alt2)', fontSize: 14 }}>Name the dataset and confirm.</p> },
          ]}
        />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
