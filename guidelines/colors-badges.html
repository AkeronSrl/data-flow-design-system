<!-- @dsCard group="Colors" viewport="700x130" name="Badge / Tag Palette" subtitle="Categorical hues for tags, statuses and labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { display:inline-flex; align-items:center; height: 22px; padding: 0 10px; border-radius: 12px; color:#fff; font-size:12px; font-weight:700; }
</style>
</head>
<body>
  <div class="row">
    <span class="tag" style="background:var(--color-badge-dark-red)">dark-red</span>
    <span class="tag" style="background:var(--color-badge-red)">red</span>
    <span class="tag" style="background:var(--color-badge-orange)">orange</span>
    <span class="tag" style="background:var(--color-badge-amber)">amber</span>
    <span class="tag" style="background:var(--color-badge-green)">green</span>
    <span class="tag" style="background:var(--color-badge-blue)">blue</span>
    <span class="tag" style="background:var(--color-badge-purple)">purple</span>
    <span class="tag" style="background:var(--color-badge-dark-purple)">dark-purple</span>
    <span class="tag" style="background:var(--color-badge-pink)">pink</span>
    <span class="tag" style="background:var(--color-badge-dark-pink)">dark-pink</span>
    <span class="tag" style="background:var(--color-neutral-140)">neutral</span>
  </div>
</body>
</html>
