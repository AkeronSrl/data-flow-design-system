<!-- @dsCard group="Colors" viewport="700x170" name="Neutral Scale" subtitle="Warm Fluent2 grey, neutral-10 (lightest) → neutral-220 (near-black)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); }
  .row { display: flex; gap: 4px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 5px; align-items: center; }
  .chip { width: 100%; height: 56px; border-radius: var(--radius-md); border: 1px solid var(--color-border-light); }
  .lbl { font-size: 9px; font-weight: 600; color: var(--color-foreground-alt2); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-neutral-10)"></div><span class="lbl">10</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-20)"></div><span class="lbl">20</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-30)"></div><span class="lbl">30</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-50)"></div><span class="lbl">50</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-70)"></div><span class="lbl">70</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-90)"></div><span class="lbl">90</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-110)"></div><span class="lbl">110</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-130)"></div><span class="lbl">130</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-150)"></div><span class="lbl">150</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-170)"></div><span class="lbl">170</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-190)"></div><span class="lbl">190</span></div>
    <div class="sw"><div class="chip" style="background:var(--color-neutral-210)"></div><span class="lbl">210</span></div>
  </div>
</body>
</html>
