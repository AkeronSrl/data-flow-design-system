<!-- @dsCard group="Colors" viewport="700x150" name="Status / Semantic" subtitle="Success, warning, danger, info — base + soft surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); }
  .row { display: flex; gap: 12px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 48px; border-radius: var(--radius-lg); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; }
  .soft { height: 26px; border-radius: var(--radius-md); border:1px solid var(--color-border-light); }
  .lbl { font-size: 11px; font-weight: 600; color: var(--color-foreground); }
  .hex { font-size: 10px; color: var(--color-foreground-alt3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="chip" style="background:var(--color-success-500)">Success</div><div class="soft" style="background:var(--color-success-100)"></div><span class="lbl">success</span><span class="hex">#00a239</span></div>
    <div class="col"><div class="chip" style="background:var(--color-warning-500)">Warning</div><div class="soft" style="background:var(--color-warning-100)"></div><span class="lbl">warning</span><span class="hex">#ff9500</span></div>
    <div class="col"><div class="chip" style="background:var(--color-danger-500)">Danger</div><div class="soft" style="background:var(--color-danger-100)"></div><span class="lbl">danger</span><span class="hex">#eb0000</span></div>
    <div class="col"><div class="chip" style="background:var(--color-info-500)">Info</div><div class="soft" style="background:var(--color-info-100)"></div><span class="lbl">info</span><span class="hex">#3c69fb</span></div>
  </div>
</body>
</html>
