<!-- @dsCard group="Spacing" viewport="700x150" name="Radius Scale" subtitle="From sm (4) to 2xl (16); controls use 8–14px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .row { display:flex; gap:16px; }
  .col { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .box { width:72px; height:56px; background:var(--color-accent-100); border:1.5px solid var(--color-accent-500); }
  .lbl { font-size:10px; color:var(--color-foreground-alt3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 4</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 6</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 8</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 12</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lbl">2xl · 16</span></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-full)"></div><span class="lbl">full</span></div>
  </div>
</body>
</html>
