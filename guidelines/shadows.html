<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation / Shadows" subtitle="Subtle, low-contrast elevation — panels float on near-white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-background-alt1); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .row { display:flex; gap:24px; }
  .col { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .box { width:120px; height:64px; background:var(--color-background); border-radius:var(--radius-xl); }
  .lbl { font-size:10px; color:var(--color-foreground-alt3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">shadow-sm</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">shadow-md</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-panel)"></div><span class="lbl">shadow-panel</span></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">shadow-lg</span></div>
  </div>
</body>
</html>
