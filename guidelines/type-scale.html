<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Roboto — xs 12 → 4xl 36, the working UI range" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .row { display:flex; align-items:baseline; gap:14px; padding:3px 0; }
  .tag { width:64px; font-size:11px; color:var(--color-foreground-alt3); flex-shrink:0; }
  .spec { line-height:1.1; }
</style>
</head>
<body>
  <div class="row"><span class="tag">4xl · 36</span><span class="spec" style="font-size:36px;font-weight:700">Pipelines</span></div>
  <div class="row"><span class="tag">2xl · 24</span><span class="spec" style="font-size:24px;font-weight:700">Order sync</span></div>
  <div class="row"><span class="tag">xl · 20</span><span class="spec" style="font-size:20px;font-weight:600">Datasets &amp; transformations</span></div>
  <div class="row"><span class="tag">lg · 18</span><span class="spec" style="font-size:18px;font-weight:500">Connector configuration</span></div>
  <div class="row"><span class="tag">base · 16</span><span class="spec" style="font-size:16px;font-weight:400">Source dataset · Salesforce</span></div>
  <div class="row"><span class="tag">sm · 14</span><span class="spec" style="font-size:14px;font-weight:400">Table and form text</span></div>
  <div class="row"><span class="tag">xs · 12</span><span class="spec" style="font-size:12px;font-weight:500">Labels and metadata</span></div>
</body>
</html>
