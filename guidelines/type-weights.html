<!-- @dsCard group="Type" viewport="700x130" name="Font Weights" subtitle="Roboto — 300 light to 700 bold; 400/500/600 do the UI work" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--color-background); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .row { display:flex; gap:24px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:2px; }
  .sp { font-size:26px; }
  .lbl { font-size:10px; color:var(--color-foreground-alt3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><span class="sp" style="font-weight:300">Aa</span><span class="lbl">Light 300</span></div>
    <div class="col"><span class="sp" style="font-weight:400">Aa</span><span class="lbl">Regular 400</span></div>
    <div class="col"><span class="sp" style="font-weight:500">Aa</span><span class="lbl">Medium 500</span></div>
    <div class="col"><span class="sp" style="font-weight:600">Aa</span><span class="lbl">Semibold 600</span></div>
    <div class="col"><span class="sp" style="font-weight:700">Aa</span><span class="lbl">Bold 700</span></div>
    <div class="col"><span class="sp" style="font-weight:900">Aa</span><span class="lbl">Black 900</span></div>
  </div>
</body>
</html>
