<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-background); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .cell { border:1px solid var(--color-border-light); border-radius:var(--radius-lg); padding:12px 14px; }
  .do { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .yes { color:var(--color-success-600); }
  .no { color:var(--color-danger-600); }
  .ex { font-size:14px; margin-top:6px; color:var(--color-foreground-alt1); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="do yes">Do</span><div class="ex">"This workspace has no pipelines yet. Create one to start moving data."</div></div>
    <div class="cell"><span class="do no">Don't</span><div class="ex">"Looks like it's empty in here! Let's build something amazing together 🚀"</div></div>
    <div class="cell"><span class="do yes">Do</span><div class="ex">"No executions match these filters."</div></div>
    <div class="cell"><span class="do no">Don't</span><div class="ex">"Oops! We couldn't find anything for you…"</div></div>
  </div>
</body>
</html>
