<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--color-background); font-family: var(--font-family-sans); color: var(--color-foreground); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .cell { border:1px solid var(--color-border-light); border-radius:var(--radius-lg); padding:12px 14px; }
  .do { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .yes { color:var(--color-success-600); }
  .no { color:var(--color-danger-600); }
  .ex { font-size:14px; margin-top:6px; color:var(--color-foreground-alt1); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><span class="do yes">Do</span><div class="ex">"Crea il primo ordine per iniziare a tracciare le vendite."</div></div>
    <div class="cell"><span class="do no">Don't</span><div class="ex">"Inizia subito il tuo fantastico viaggio nel mondo degli ordini! 🚀"</div></div>
    <div class="cell"><span class="do yes">Do</span><div class="ex">"Nessun ordine corrisponde ai filtri."</div></div>
    <div class="cell"><span class="do no">Don't</span><div class="ex">"Ops! Sembra che non ci sia proprio nulla qui…"</div></div>
  </div>
</body>
</html>
