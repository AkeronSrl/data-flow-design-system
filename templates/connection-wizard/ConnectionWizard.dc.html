<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Connection wizard" description="Multi-step wizard to add a new data connection — pick a connector type, configure connection, browse the schema, preview columns, then name and confirm." -->
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Roboto', system-ui, sans-serif; }
</style>
</helmet>
<div style="display:flex; align-items:center; justify-content:center; height:100vh; width:100%; padding:32px; box-sizing:border-box; background:rgba(15,23,42,0.28);">
  <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfFlowWizard"
    title="New Connection"
    step="{{ step }}"
    total-steps="{{ 5 }}"
    next-disabled="{{ nextDisabled }}"
    complete-label="Create connection"
    on-step-change="{{ setStep }}"
    on-cancel="{{ cancel }}"
    on-complete="{{ complete }}"
    style="width:1280px; height:820px; max-width:100%; max-height:100%"
    hint-size="1280px,820px">

    <sc-if value="{{ isType }}" hint-placeholder-val="{{ true }}">
      <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfWizardStep" title="Select data source type" subtitle="Select the type of connection" hint-size="100%,100%">
        <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:12px; overflow-y:auto; padding:2px 2px 8px;">
          <sc-for list="{{ connectorTypes }}" as="item" hint-placeholder-count="12">
            <div onClick="{{ item.select }}" style="position:relative; cursor:pointer; background:white; border:1px dashed #d1d5db; border-radius:12px; padding:14px 12px 14px; display:flex; flex-direction:column; align-items:flex-start; box-sizing:border-box; min-height:170px;">
              <sc-if value="{{ item.selected }}" hint-placeholder-val="{{ false }}">
                <div style="position:absolute; inset:0; border:2px solid #1d4ed8; border-radius:12px; pointer-events:none;"></div>
              </sc-if>
              <div style="width:18px; height:18px; border-radius:50%; border:2px solid #93c5fd; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <sc-if value="{{ item.selected }}" hint-placeholder-val="{{ false }}">
                  <div style="width:8px; height:8px; border-radius:50%; background:#1d4ed8;"></div>
                </sc-if>
              </div>
              <div style="flex:1; width:100%; display:flex; align-items:center; justify-content:center; padding:8px 4px;">
                <img src="{{ item.logo }}" alt="{{ item.name }}" style="max-width:68px; max-height:56px; object-fit:contain;" />
              </div>
              <div style="font-size:13px; font-weight:500; color:#1565C0;">{{ item.name }}</div>
            </div>
          </sc-for>
        </div>
      </x-import>
    </sc-if>

    <sc-if value="{{ isConn }}" hint-placeholder-val="{{ false }}">
      <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfWizardStep" title="Select a connection" subtitle="Pick a configured connection for this source." hint-size="100%,100%">
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfConnectorList" connectors="{{ connectors }}" value="{{ connectionId }}" on-select="{{ setConnection }}" hint-size="100%,auto"></x-import>
      </x-import>
    </sc-if>

    <sc-if value="{{ isObject }}" hint-placeholder-val="{{ false }}">
      <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfWizardStep" title="Choose an object" subtitle="Browse the schema and select a table to read from." hint-size="100%,100%">
        <div style="height:340px;">
          <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfSchemaTree" title="analytics_pg" summary="PostgreSQL · public" nodes="{{ schemaNodes }}" selected-id="{{ tableId }}" on-select="{{ setTable }}" hint-size="100%,100%"></x-import>
        </div>
      </x-import>
    </sc-if>

    <sc-if value="{{ isColumns }}" hint-placeholder-val="{{ false }}">
      <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfWizardStep" title="Select columns" subtitle="Review the columns this dataset will expose; cast or rename as needed." hint-size="100%,100%">
        <div style="max-height:340px; overflow:auto;">
          <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfPreviewGrid" columns="{{ previewCols }}" rows="{{ previewRows }}" selected-count="{{ 5 }}" total-count="{{ 8 }}" column-menu="{{ true }}" hint-size="100%,auto"></x-import>
        </div>
      </x-import>
    </sc-if>

    <sc-if value="{{ isReview }}" hint-placeholder-val="{{ false }}">
      <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfWizardStep" title="Name & confirm" subtitle="Give the connection a name and review your choices." hint-size="100%,100%">
        <div style="display:flex; flex-direction:column; gap:20px;">
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label style="font-size:12px; font-weight:600; color:var(--color-foreground-alt2);">Connection name</label>
            <input value="{{ datasetName }}" onChange="{{ setName }}" placeholder="e.g. analytics_pg_prod" style="width:100%; height:38px; padding:0 12px; box-sizing:border-box; border:1.5px solid var(--color-border); border-radius:10px; font-family:inherit; font-size:14px; font-weight:500; color:var(--color-foreground); background:var(--color-background);" />
          </div>
          <div style="display:flex; flex-direction:column; gap:10px; background:var(--color-background-alt1); border:1px solid var(--color-border-light); border-radius:12px; padding:16px;">
            <div style="display:flex; justify-content:space-between; gap:16px; font-size:14px;"><span style="color:var(--color-foreground-alt3);">Source type</span><span style="font-weight:600;">{{ reviewType }}</span></div>
            <div style="display:flex; justify-content:space-between; gap:16px; font-size:14px;"><span style="color:var(--color-foreground-alt3);">Connection</span><span style="font-weight:600;">{{ reviewConn }}</span></div>
            <div style="display:flex; justify-content:space-between; gap:16px; font-size:14px;"><span style="color:var(--color-foreground-alt3);">Object</span><span style="font-weight:600;">{{ reviewTable }}</span></div>
          </div>
        </div>
      </x-import>
    </sc-if>

  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { step: 1, sourceType: null, connectionId: null, tableId: null, datasetName: '' };

  setStep = (n) => this.setState({ step: n });
  setSourceType = (v) => this.setState({ sourceType: v });
  setConnection = (c) => this.setState({ connectionId: c.id });
  setTable = (node) => { if (node && node.selectable) this.setState({ tableId: node.id, datasetName: this.state.datasetName || `${node.id}_dataset` }); };
  setName = (e) => this.setState({ datasetName: e.target.value });
  cancel = () => {};
  complete = () => {};

  renderVals() {
    const s = this.state;

    const connectorTypes = [
      { id: 'postgresql',      name: 'PostgreSQL',         logo: '../../assets/icons/pg.png' },
      { id: 'sqlserver',       name: 'SQLServer',          logo: '../../assets/icons/mssql.png' },
      { id: 'oracle',          name: 'Oracle',             logo: '../../assets/icons/oracle.png' },
      { id: 'saphana',         name: 'SapHana',            logo: '../../assets/icons/sap.png' },
      { id: 'csv',             name: 'Csv',                logo: '../../assets/icons/csv.png' },
      { id: 'excel',           name: 'Excel',              logo: '../../assets/icons/excel.png' },
      { id: 'amazonsqs',       name: 'Amazon SQS',         logo: '../../assets/icons/aws.png' },
      { id: 'amazons3',        name: 'Amazon S3',          logo: '../../assets/icons/s3.png' },
      { id: 'azureblob',       name: 'Azure Blob Storage', logo: '../../assets/icons/azure.png' },
      { id: 'salesforce',      name: 'Salesforce',         logo: '../../assets/icons/salesforce.png' },
      { id: 'hubspot',         name: 'HubSpot',            logo: '../../assets/icons/hubspot.svg' },
      { id: 'businesscentral', name: 'Business Central',   logo: '../../assets/icons/business-central.png' },
      { id: 'restapi',         name: 'REST API',           logo: '../../assets/icons/rest-api.png' },
    ].map((ct) => ({
      ...ct,
      selected: ct.id === s.sourceType,
      select: () => this.setState({ sourceType: ct.id }),
    }));

    const connectors = [
      { id: 'pg-prod', name: 'analytics_pg (prod)', meta: 'PostgreSQL · eu-west-1', icon: 'database' },
      { id: 'pg-stg',  name: 'analytics_pg (staging)', meta: 'PostgreSQL · eu-west-1', icon: 'database' },
      { id: 'warehouse', name: 'snowflake_warehouse', meta: 'JDBC · acme.snowflakecomputing.com', icon: 'database' },
    ];
    const schemaNodes = [
      {
        id: 'public', label: 'public', icon: 'fa-solid fa-folder', defaultExpanded: true,
        items: [
          { id: 'orders',      label: 'orders',      description: 'table · 1.4M rows', icon: 'fa-solid fa-table', selectable: true, badge: { text: '8',  tone: 'info' } },
          { id: 'customers',   label: 'customers',   description: 'table · 92K rows',  icon: 'fa-solid fa-table', selectable: true, badge: { text: '12', tone: 'info' } },
          { id: 'products',    label: 'products',    description: 'table · 3.1K rows',  icon: 'fa-solid fa-table', selectable: true, badge: { text: '6',  tone: 'info' } },
          { id: 'order_items', label: 'order_items', description: 'table · 5.2M rows',  icon: 'fa-solid fa-table', selectable: true, badge: { text: '5',  tone: 'info' } },
        ],
      },
    ];
    const previewCols = [
      { field: 'order_id', caption: 'order_id',    type: 'number' },
      { field: 'customer', caption: 'customer',    type: 'string' },
      { field: 'total',    caption: 'total_amount', type: 'number',   cast: true },
      { field: 'created',  caption: 'created_at',  type: 'datetime' },
      { field: 'paid',     caption: 'is_paid',     type: 'boolean' },
    ];
    const previewRows = [
      { order_id: 100432, customer: 'Northwind Ltd', total: '1240.00', created: '2026-06-25 14:32', paid: 'true' },
      { order_id: 100433, customer: 'Globex',        total: '88.50',   created: '2026-06-25 14:35', paid: 'false' },
      { order_id: 100434, customer: 'Initech',       total: '4019.90', created: '2026-06-25 14:41', paid: 'true' },
    ];

    const selectedType = connectorTypes.find((t) => t.id === s.sourceType);
    const typeLabel = selectedType ? selectedType.name : '—';
    const connLabel = (connectors.find((c) => c.id === s.connectionId) || {}).name || '—';

    const nextDisabled =
      (s.step === 1 && !s.sourceType) ||
      (s.step === 2 && !s.connectionId) ||
      (s.step === 3 && !s.tableId) ||
      (s.step === 5 && !s.datasetName.trim());

    return {
      step: s.step,
      setStep: this.setStep,
      nextDisabled,
      cancel: this.cancel,
      complete: this.complete,
      isType:    s.step === 1,
      isConn:    s.step === 2,
      isObject:  s.step === 3,
      isColumns: s.step === 4,
      isReview:  s.step === 5,
      connectorTypes,
      sourceType: s.sourceType,
      setSourceType: this.setSourceType,
      connectors,
      connectionId: s.connectionId,
      setConnection: this.setConnection,
      schemaNodes,
      tableId: s.tableId,
      setTable: this.setTable,
      previewCols,
      previewRows,
      datasetName: s.datasetName,
      setName: this.setName,
      reviewType:  typeLabel,
      reviewConn:  connLabel,
      reviewTable: s.tableId || '—',
    };
  }
}
</script>
</body>
</html>
