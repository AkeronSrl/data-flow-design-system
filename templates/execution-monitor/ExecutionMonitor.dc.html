<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Execution monitor" description="Execution monitoring dashboard — KPI tiles, search + status filters, and the expandable run log for a workspace." -->
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Roboto', system-ui, sans-serif; }
</style>
</helmet>
<div style="display:flex; height:100vh; width:100%; background:var(--color-background-alt1); color:var(--color-foreground);">
  <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfSideMenu" items="{{ navItems }}" active-id="logs" expanded="{{ true }}" hint-size="248px,100%"></x-import>

  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfHeader" title="Executions" subtitle="Acme Analytics / Production" hint-size="100%,64px"></x-import>

    <div style="flex:1; overflow:auto; min-height:0; display:flex; flex-direction:column; gap:20px; padding:20px;">

      <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:16px;">
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.TiaraStatCard" label="Runs (24h)" value="{{ kpiTotal }}" hint-size="100%,auto"></x-import>
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.TiaraStatCard" label="Succeeded" value="{{ kpiOk }}" delta="{{ kpiOkDelta }}" hint-size="100%,auto"></x-import>
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.TiaraStatCard" label="Failed" value="{{ kpiFail }}" delta="{{ kpiFailDelta }}" hint-size="100%,auto"></x-import>
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.TiaraStatCard" label="Avg duration" value="{{ kpiAvg }}" hint-size="100%,auto"></x-import>
      </div>

      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div style="display:inline-flex; align-items:center; gap:8px; height:36px; padding:0 12px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:10px; min-width:240px;">
          <i class="fa-solid fa-magnifying-glass" style="color:var(--color-icon);" aria-hidden="true"></i>
          <input value="{{ query }}" onChange="{{ setQuery }}" placeholder="Search pipelines…" style="flex:1; min-width:0; border:0; outline:none; background:transparent; font-family:inherit; font-size:14px; font-weight:500; color:var(--color-foreground);" />
        </div>
        <div style="display:flex; align-items:center; gap:6px;">
          <sc-for list="{{ statusFilters }}" as="f" hint-placeholder-count="5">
            <button type="button" class="{{ f.cls }}" onClick="{{ f.onClick }}">{{ f.label }}</button>
          </sc-for>
        </div>
        <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
          <span style="font-size:13px; color:var(--color-foreground-alt3);">{{ resultCount }}</span>
          <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.TiaraButton" variant="secondary" size="sm" on-click="{{ refresh }}" hint-size="auto,auto">Refresh</x-import>
        </div>
      </div>

      <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfExecutionLog" executions="{{ filtered }}" multi-expand="{{ true }}" hint-size="100%,auto"></x-import>
      </sc-if>
      <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:48px; color:var(--color-foreground-alt3);">
          <i class="fa-solid fa-list-check" style="font-size:32px; color:var(--color-accent-300, var(--color-accent-500));" aria-hidden="true"></i>
          <span>No executions match these filters.</span>
        </div>
      </sc-if>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: '', status: 'all' };

  setQuery = (e) => this.setState({ query: e.target.value });
  setStatus = (k) => this.setState({ status: k });
  refresh = () => this.setState({ query: '', status: 'all' });

  ALL_EXECS = [
    {
      id: 'e1', status: 'succeeded', pipeline: 'daily_revenue_sync', statusText: 'Completed', workspace: 'Production',
      startTime: '2026-06-25 14:32', duration: '00:04:31', user: 'data-eng', hasAudit: true,
      details: [
        { outcome: 'ok', description: 'Read orders (1.4M rows)', occurredAt: '14:32:01', duration: '52s', user: 'system' },
        { outcome: 'ok', description: 'Join orders_enriched', occurredAt: '14:33:10', duration: '1m 12s', user: 'system' },
        { outcome: 'ok', description: 'Export to S3', occurredAt: '14:35:40', duration: '2m 27s', user: 'system' },
      ],
    },
    {
      id: 'e2', status: 'warning', pipeline: 'hubspot_contacts', statusText: 'Partially failed', workspace: 'Production',
      startTime: '2026-06-25 13:10', duration: '00:01:58', user: 'scheduler',
      details: [
        { outcome: 'ok', description: 'Fetch contacts', occurredAt: '13:10:02', duration: '44s', user: 'system' },
        { outcome: 'warning', description: 'Export — 12 rows rejected', occurredAt: '13:11:30', duration: '1m 02s', user: 'system' },
      ],
    },
    {
      id: 'e3', status: 'failed', pipeline: 'sqs_orders_stream', statusText: 'Failed — DLQ', workspace: 'Staging',
      startTime: '2026-06-25 09:48', duration: '00:00:12', user: 'svc-account',
      details: [{ outcome: 'ko', description: 'Connection refused (timeout)', occurredAt: '09:48:12', duration: '12s', user: 'system' }],
    },
    {
      id: 'e4', status: 'running', pipeline: 'nightly_warehouse_load', statusText: 'Running', workspace: 'Production',
      startTime: '2026-06-25 15:00', duration: '00:02:09', user: 'scheduler',
    },
    {
      id: 'e5', status: 'succeeded', pipeline: 'salesforce_accounts', statusText: 'Completed', workspace: 'Production',
      startTime: '2026-06-25 08:00', duration: '00:03:12', user: 'scheduler',
      details: [{ outcome: 'ok', description: 'Upsert accounts (92K rows)', occurredAt: '08:00:30', duration: '3m 12s', user: 'system' }],
    },
    {
      id: 'e6', status: 'succeeded', pipeline: 'daily_revenue_sync', statusText: 'Completed', workspace: 'Production',
      startTime: '2026-06-24 14:32', duration: '00:04:48', user: 'scheduler',
    },
  ];

  renderVals() {
    const { query, status } = this.state;
    const q = query.trim().toLowerCase();

    const filtered = this.ALL_EXECS.filter((e) =>
      (status === 'all' || e.status === status) &&
      (!q || String(e.pipeline).toLowerCase().includes(q))
    );

    const filters = [
      { key: 'all', label: 'All' },
      { key: 'succeeded', label: 'Succeeded' },
      { key: 'failed', label: 'Failed' },
      { key: 'warning', label: 'Warning' },
      { key: 'running', label: 'Running' },
    ];
    const statusFilters = filters.map((f) => ({
      label: f.label,
      cls: 'tia-btn tia-btn--sm ' + (status === f.key ? 'tia-btn--primary' : 'tia-btn--ghost'),
      onClick: () => this.setStatus(f.key),
    }));

    const ok = this.ALL_EXECS.filter((e) => e.status === 'succeeded').length;
    const fail = this.ALL_EXECS.filter((e) => e.status === 'failed').length;

    return {
      navItems: [
        { section: 'Workspace' },
        { id: 'pipelines', label: 'Pipelines', icon: 'fa-solid fa-diagram-project', children: true },
        { id: 'datasources', label: 'Data sources', icon: 'fa-solid fa-plug' },
        { id: 'datasets', label: 'Datasets', icon: 'fa-solid fa-table' },
        { section: 'Operate' },
        { id: 'executions', label: 'Executions', icon: 'fa-solid fa-play' },
        { id: 'logs', label: 'Logs & metrics', icon: 'fa-solid fa-clock-rotate-left' },
        { id: 'query', label: 'Query Analyzer', icon: 'fa-solid fa-magnifying-glass-chart' },
      ],
      kpiTotal: String(this.ALL_EXECS.length),
      kpiOk: String(ok),
      kpiOkDelta: '+2',
      kpiFail: String(fail),
      kpiFailDelta: '-1',
      kpiAvg: '00:03:18',
      query,
      setQuery: this.setQuery,
      statusFilters,
      refresh: this.refresh,
      filtered,
      resultCount: `${filtered.length} of ${this.ALL_EXECS.length} runs`,
      hasResults: filtered.length > 0,
      empty: filtered.length === 0,
    };
  }
}
</script>
</body>
</html>
