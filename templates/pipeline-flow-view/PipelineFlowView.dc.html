<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Pipeline Flow View" description="Pipeline detail screen — full-width visual transformation DAG with selected-dataset preview grid below." -->
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Roboto', system-ui, sans-serif; }
</style>
</helmet>
<div style="display:flex; height:100vh; width:100%; background:var(--color-background-alt1); color:var(--color-foreground);">

  <!-- ── Sidebar ── -->
  <div style="width:220px; flex-shrink:0; background:#0f172a; display:flex; flex-direction:column; overflow:hidden;">
    <div style="padding:22px 20px 16px; flex-shrink:0;">
      <span style="font-size:22px; font-weight:900; color:#fff; letter-spacing:-0.5px; line-height:1; user-select:none; font-family:inherit;">Vul<span style="color:#38bdf8; font-style:italic;">K</span>i</span>
    </div>
    <div style="padding:0 12px 12px; flex-shrink:0;">
      <div style="display:flex; align-items:center; gap:8px; height:34px; padding:0 10px; background:#1e293b; border-radius:6px; border:1px solid #334155;">
        <i class="fa-solid fa-magnifying-glass" style="color:#475569; font-size:12px;"></i>
        <input placeholder="Search…" style="flex:1; min-width:0; border:0; outline:0; background:transparent; font-family:inherit; font-size:13px; color:#94a3b8;" />
      </div>
    </div>
    <nav style="flex:1; min-height:0; overflow:auto; padding:0 8px; display:flex; flex-direction:column; gap:2px;">
      <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; cursor:pointer; color:#94a3b8;" style-hover="background:#1e293b; color:#e2e8f0;">
        <i class="fa-solid fa-house" style="width:16px; text-align:center; font-size:14px; flex-shrink:0;"></i>
        <span style="font-size:14px; font-weight:500;">Home</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; cursor:pointer; color:#94a3b8;" style-hover="background:#1e293b; color:#e2e8f0;">
        <i class="fa-solid fa-globe" style="width:16px; text-align:center; font-size:14px; flex-shrink:0;"></i>
        <span style="font-size:14px; font-weight:500;">Connections</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; cursor:pointer; background:#0099F7; color:#fff;">
        <i class="fa-solid fa-table-cells" style="width:16px; text-align:center; font-size:14px; flex-shrink:0;"></i>
        <span style="font-size:14px; font-weight:500;">Workspaces</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:6px; cursor:pointer; color:#94a3b8;" style-hover="background:#1e293b; color:#e2e8f0;">
        <i class="fa-solid fa-clock-rotate-left" style="width:16px; text-align:center; font-size:14px; flex-shrink:0;"></i>
        <span style="font-size:14px; font-weight:500;">Log Pipeline</span>
      </div>
    </nav>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    <div style="padding:16px 20px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;">
      <h1 style="margin:0; font-size:20px; font-weight:700; color:var(--color-foreground); letter-spacing:-0.3px;">daily_revenue_sync</h1>
      <div style="display:flex; gap:8px;">
        <button style="display:inline-flex; align-items:center; gap:6px; padding:0 14px; height:32px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:var(--color-foreground);">
          <i class="fa-solid fa-clock-rotate-left" style="font-size:11px;"></i>History
        </button>
        <button style="display:inline-flex; align-items:center; gap:6px; padding:0 14px; height:32px; background:var(--color-primary); border:0; border-radius:6px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:#fff;">
          <i class="fa-solid fa-play" style="font-size:11px;"></i>Run pipeline
        </button>
      </div>
    </div>
    <div style="height:1px; background:var(--color-border); flex-shrink:0;"></div>
    <div style="flex:1; overflow:auto; min-height:0; display:flex; flex-direction:column; gap:20px; padding:20px;">
      <div style="height:440px; display:flex;">
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfPipelineFlow" title="Pipeline flow" subtitle="5 datasets · 2 sources" nodes="{{ nodes }}" connections="{{ conns }}" selected-id="{{ selectedId }}" on-select="{{ selectNode }}" style="width:100%" hint-size="100%,100%"></x-import>
      </div>

      <div style="background:var(--panel-bg, #fff); border:1px solid var(--color-border-light); border-radius:12px; overflow:hidden; box-shadow:var(--shadow-panel);">
        <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--color-border-light);">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:13px; color:var(--color-foreground-alt3); font-weight:500;">Source actions:</span>
            <button style="display:inline-flex; align-items:center; gap:6px; padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">
              <i class="fa-solid fa-table-columns" style="font-size:10px;"></i>Add Source Columns
            </button>
          </div>
          <div style="display:flex; gap:6px;">
            <button style="padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">Group by</button>
            <button style="padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">Join</button>
            <button style="padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">Union</button>
            <button style="padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">Subset</button>
            <button style="display:inline-flex; align-items:center; gap:6px; padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">
              <i class="fa-solid fa-plus" style="font-size:10px;"></i>Add column
            </button>
            <button style="display:inline-flex; align-items:center; gap:6px; padding:0 12px; height:28px; background:var(--color-background); border:1.5px solid var(--color-border); border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; color:var(--color-foreground);">
              <i class="fa-solid fa-arrow-up-from-bracket" style="font-size:10px;"></i>Export
            </button>
          </div>
        </div>
        <x-import component-from-global-scope="TiaraDesignSystemNyma_96297e.DfPreviewGrid" columns="{{ previewCols }}" rows="{{ previewRows }}" column-menu="{{ true }}" hint-size="100%,auto"></x-import>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { selectedId: 'enriched' };

  selectNode = (node) => this.setState({ selectedId: node.id });

  renderVals() {


    const nodes = [
      { id: 'orders', name: 'orders', description: 'PostgreSQL source', connector: 'analytics_pg', type: 'source', icon: 'database' },
      { id: 'customers', name: 'customers', description: 'Salesforce source', connector: 'Sales Cloud', type: 'source', icon: 'cloud' },
      { id: 'enriched', name: 'orders_enriched', description: 'Joined on customer_id', type: 'join' },
      { id: 'agg', name: 'revenue_by_region', description: 'Aggregation', type: 'derived' },
      { id: 'subset', name: 'eu_orders', description: 'Subset · region = EU', type: 'derived' },
    ];
    const conns = [
      { from: 'orders', to: 'enriched', operation: 'Inner join' },
      { from: 'customers', to: 'enriched', operation: 'Inner join' },
      { from: 'enriched', to: 'agg', operation: 'Aggregation' },
      { from: 'enriched', to: 'subset', operation: 'Subset' },
    ];
    const previewCols = [
      { field: 'SalesID',     caption: 'SalesID',     type: 'string' },
      { field: 'SalesDate',   caption: 'SalesDate',   type: 'date' },
      { field: 'PayeeCode',   caption: 'PayeeCode',   type: 'string' },
      { field: 'ClientCode',  caption: 'ClientCode',  type: 'string' },
      { field: 'ProductCode', caption: 'ProductCode', type: 'string' },
      { field: 'Value',       caption: 'Value',       type: 'string' },
      { field: 'Units',       caption: 'Units',       type: 'number' },
    ];

    const previewRows = [];

    return {
      nodes,
      conns,
      selectedId: this.state.selectedId,
      selectNode: this.selectNode,
      previewCols,
      previewRows,
    };
  }
}
</script>
</body>
</html>
